<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ezlet</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />

    <style type="text/tailwindcss">
      * { box-sizing: border-box; }

      /* pg-custom-toast lives inside the Ezlet pill */
      .pg-custom-toast {
        display: grid;
        gap: 2px;
        min-width: 0;
      }
      .pg-custom-toast strong,
      .pg-custom-toast span {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .pg-custom-toast span { color: var(--ezlet-muted); font-size: 12px; }
    </style>
  </head>
  <body class="m-0 min-h-dvh bg-[#08090c] text-white font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="./src/entry.tsx"></script>
  </body>
</html>
