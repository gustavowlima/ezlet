name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun --cwd packages/ezlet run lint

      - name: Typecheck
        run: bun --cwd packages/ezlet run typecheck

      - name: Test
        run: bun --cwd packages/ezlet test

      - name: Build
        run: bun --cwd packages/ezlet run build

      - name: Verify release tag matches package version
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/ezlet/package.json').version")
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$RELEASE_VERSION" ]; then
            echo "Release tag ($GITHUB_REF_NAME) does not match packages/ezlet/package.json version ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Verify package contents
        working-directory: packages/ezlet
        run: npm pack --dry-run

      - name: Publish to npm
        working-directory: packages/ezlet
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
