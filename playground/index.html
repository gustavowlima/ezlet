<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>island-toast — Premium Dynamic Island Toasts</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- Tailwind v4 Play CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Island Toast CSS -->
    <link rel="stylesheet" href="../src/styles/island-toast.css" />
    
    <!-- Custom Tailwind Configurations -->
    <style type="text/tailwindcss">
      @theme {
        --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        --font-display: 'Plus Jakarta Sans', var(--font-sans);
        
        --color-brand-primary: #3b82f6;
        --color-brand-success: #10b981;
        --color-brand-error: #ef4444;
        --color-brand-warning: #f59e0b;
        --color-brand-info: #3b82f6;
        
        --color-bg-light: #fafafa;
        --color-bg-dark: #09090b;
        --color-surface-light: #ffffff;
        --color-surface-dark: #18181b;
        --color-border-light: rgba(9, 9, 11, 0.06);
        --color-border-dark: rgba(255, 255, 255, 0.08);
      }
      
      @custom-variant dark (&:where(.dark, .dark *));
      
      /* Smooth interactions for interactive elements */
      button, a, input, select {
        transition-property: color, background-color, border-color, text-decoration-color, fill, stroke, opacity, box-shadow, transform;
        transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
        transition-duration: 200ms;
      }
      
      /* Pulse animation for the live indicator */
      @keyframes pulse-ring {
        0% { transform: scale(0.65); opacity: 0; }
        50% { opacity: 0.5; }
        100% { transform: scale(1.3); opacity: 0; }
      }
      .animate-pulse-ring {
        animation: pulse-ring 2s cubic-bezier(0.24, 0, 0.38, 1) infinite;
      }
    </style>
  </head>
  <body class="bg-bg-light dark:bg-bg-dark text-neutral-800 dark:text-neutral-200 font-sans min-h-dvh antialiased flex flex-col">
    <div id="root" class="flex-1 flex flex-col"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
